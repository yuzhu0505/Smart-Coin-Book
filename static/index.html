<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員系統</title>
</head>
<body>
    <h2>登入證號</h2>
    <div>
        信 箱:<input type="text" id="signin-email"><br>
        密 碼:<input type="password" id="signin-password"><br>
        <button onclick="signin();">登入</button>
    </div>

    <h2>註冊證號</h2>
    <div>
        姓 名:<input type="text" id="signup-name"><br>
        信 箱:<input type="text" id="signup-email"><br>
        密 碼:<input type="password" id="signup-password"><br>
        <button onclick="signup();">註冊</button>
    </div>

    <script>
        async function signup(){
            let name = document.querySelector("#signup-name").value;
            let email = document.querySelector("#signup-email").value;
            let password = document.querySelector("#signup-password").value;
            let response = await fetch("/api/member",{
                method: "POST",
                body: JSON.stringify({
                    "name": name, 
                    "email": email,
                    "password": password
                    })
            });
            let result = await response.json();
            if(result.ok){
                alert("註冊成功");
            }else{
                alert("註冊失敗");
            }
        }

        async function signin(){
            let email = document.querySelector("#signin-email").value;
            let password = document.querySelector("#signin-password").value;
            let response = await fetch("api/member/auth",{
                method: "PUT",
                body: JSON.stringify({
                    "email":email, "password":password
                    })
            });
            let result = await response.json();
            if(result.ok){
                alert("登入成功");
                window.location = "/member.html";
            }else{
                alert("登入失敗");
            }
        }
    </script>    

</body>
</html>
