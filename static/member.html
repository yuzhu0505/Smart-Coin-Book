<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳頁面</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
</head>
<body>
    <h1>記帳頁面</h1>
    <div><span id="name"></span>的記帳頁面！</div>
    <hr/>
    <div>
        品 項:<input type="text" id="item"><br>
        金 額:<input type="number" id="cost"><br>
        類 別:
        <select id="category">
            <option value="General"> ---請選擇---</option>
            <option value="餐飲">🍔 餐飲</option>
            <option value="交通">🚗 交通</option>
            <option value="生活用品">🛒 生活用品</option>
            <option value="娛樂">🎮 娛樂</option>
            <option value="3C產品">🖥️ 3C產品</option>
            <option value="服飾">🧥 服飾</option>
            <option value="醫療">💊 醫療</option>
            <option value="其他">📦 其他</option>
        </select><br>
        <button onclick="input_expense();">新增花費</button>
    </div>

    <h2>我的最新花費紀錄</h2>
    <div id="expense-list"></div>

    <h2>📊 統計資訊</h2>
    <div>本月平均單筆花費： <span id="avg-expense-display">計算中...</span> 元</div>
    
    <div style="width: 400px; height: 400px; margin-top: 20px;">
        <canvas id="myPieChart"></canvas>
    </div>
    <button onclick="signout();">登出</button>



    <script>  
        // 宣告一個全域變數來記住目前的圖表
        let pieChartInstance = null; 

        // 畫圓餅圖的專屬函式
        async function draw_piechart() {
            let response = await fetch("/api/member/auth/expenses/piechart", {
                method: "GET"
            });
            let result = await response.json();

            if (result.ok) {
                let labels = [];     // 裝類別 (如：餐飲、交通)
                let chartData = [];  // 裝金額 (如：5000, 1200)

                // 剝開後端傳來的雙層陣列
                for(let i = 0; i < result.data.length; i++) {
                    labels.push(result.data[i][0]);  // 第 0 個位置是類別名稱
                    chartData.push(result.data[i][1]); // 第 1 個位置是加總金額
                }

                // 抓取剛剛準備好的畫布
                let ctx = document.querySelector('#myPieChart').getContext('2d');

                // ⚠️ 【防呆機制】：如果畫布上已經有舊的圖表，必須先「摧毀 (destroy)」它，才能畫新的，否則圖表重疊會大當機！
                if (pieChartInstance !== null) {
                    pieChartInstance.destroy();
                }

                // 正式請 Chart.js 幫我們畫圖！
                pieChartInstance = new Chart(ctx, {
                    plugins: [ChartDataLabels],
                    type: 'pie', // 圖表類型：圓餅圖 (pie), 也可以改成長條圖 (bar) 喔！
                    data: {
                        labels: labels,
                        datasets: [{
                            data: chartData,
                            backgroundColor: [ // 幫每個類別上不同顏色
                                '#FF6384', // 紅
                                '#36A2EB', // 藍
                                '#FFCE56', // 黃
                                '#4BC0C0', // 綠
                                '#9966FF', // 紫
                                '#FF9F40'  // 橘
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'right' }, // 把圖例放在右邊
                            datalabels: {
                                display: true, // 顯示標籤
                                color: '#fff', // 百分比字體改成白色 (在背景上才清楚)
                                font: {
                                    weight: 'bold',
                                    size: 16 // 調整字體大小
                                },
                                
                                formatter: function(value){
                                    return value
                                }
                            }
                        }
                    }
                });
            }
        }



        // 新增花費
        async function input_expense(){
            let item = document.querySelector("#item").value;
            let cost = document.querySelector("#cost").value;
            let category = document.querySelector("#category").value;
            let response = await fetch("/api/member/auth/expenses",{
                method:"POST",
                body: JSON.stringify({
                    "item": item, 
                    "cost": cost,
                    "category": category
                    })
            });
            let result = await response.json();
            if(result.ok){
                alert("新增花費成功");
                await CheckExpense();
                await calculate_avg_expense();
                await draw_piechart();
            }
        }

        // 顯示花費紀錄
        async function CheckExpense(){
            let response = await fetch("/api/member/auth/expenses", {
                method:"GET"
            });
            let result = await response.json();
            if(result.ok){
                // 1. 抓到我們剛剛在 HTML 準備的空盒子
                let box = document.querySelector("#expense-list");
                
                // 2. 先把盒子清空 (防呆：避免重複執行時資料一直疊加)
                box.innerHTML = ""; 
                
                // 3. 用 for 迴圈，把陣列裡面的每一筆花費拿出來
                for(let i = 0; i < result.expenses.length; i++){
                    let exp = result.expenses[i];

                    let exp_id = exp[0];
                    let exp_item = exp[1];
                    let exp_cost = exp[2];
                    let exp_category = exp[3];

                    // 把日期字串切割成 [年, 月, 日]
                    let yearmonth = exp[4].split("-")[0] + "/" + exp[4].split("-")[1];
                    
                    // 4. 把資料組裝成一行字，塞進盒子裡 (這裡先用最簡單的文字顯示)
                    box.innerHTML += 
                    `<div>
                        【${yearmonth}】品項：${exp_item}，花費：${exp_cost} 元，類別：${exp_category}
                        <button onclick="delete_expense(${exp_id});">❌ 刪除</button>
                    </div>`;
                }
            }    
        }
        
        // 檢查登入狀態
        async function CheckStatus(){
            let response = await fetch("/api/member/auth", {
                method:"GET"
            });
            let result = await response.json();
            if(result.ok){
                document.querySelector("#name").textContent = result.name;
                await CheckExpense();
                await calculate_avg_expense();
                await draw_piechart();
            }else{
                alert("帳號尚未登入");
                window.location = "/index.html";
            }
        }

        // 計算平均花費
        async function calculate_avg_expense(){
            let response = await fetch("/api/member/auth/expenses/avg", {
                method:"GET"
            });
            let result = await response.json();
            if(result.ok){
                // 拿到後端算好的數字
                let avg_cost = result.avg_cost;
                
                // // 抓到畫面上的容器，把數字塞進去
                document.querySelector("#avg-expense-display").textContent = avg_cost;
            }
        }

        async function delete_expense(exp_id){
            if(!confirm("確定要刪除這筆花費嗎？")){
                return; // 如果按取消，就直接結束，什麼都不做
            }
            let response = await fetch("/api/member/auth/expenses",{
                method:"DELETE",
                body: JSON.stringify({
                    "expense_id": exp_id
                    })    
            });
            let result = await response.json();
            if(result.ok){
                alert("刪除花費成功");
                await CheckExpense();
                await calculate_avg_expense();
                await draw_piechart();
            }
        }


        // 登出功能
        async function signout(){
            let response = await fetch("/api/member/auth", {
                method:"DELETE"
            });
            let result = await response.json();
            if(result.ok){
                alert("登出成功");
                window.location = "/index.html";
            }
        }
        CheckStatus();
    </script>
</body>
</html>
